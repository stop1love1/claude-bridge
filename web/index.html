<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>claude-bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // No-flash theme bootstrap. Runs before React mounts so the very
      // first paint matches the user's saved preference (or system
      // default), avoiding a dark-to-light flash on navigation.
      // Self-contained IIFE — kept in sync with src/lib/theme.ts.
      (function () {
        try {
          var k = "bridge.theme";
          var s = localStorage.getItem(k);
          var t = s === "light" || s === "dark"
            ? s
            : (window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark");
          var d = document.documentElement;
          if (t === "dark") d.classList.add("dark");
          else d.classList.remove("dark");
          d.style.colorScheme = t;
          d.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
