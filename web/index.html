<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>claude-bridge</title>
    <script>
      // No-flash theme bootstrap. Runs before React mounts so the very
      // first paint matches the user's saved preference (or system
      // default). Self-contained IIFE — kept in sync with
      // src/lib/theme.ts. Sets `data-theme` on <html> (the canonical
      // selector); never touches class names so we don't fight the
      // ThemeProvider's reconciler.
      (function () {
        try {
          var k = "bridge.theme";
          var s = localStorage.getItem(k);
          var t = s === "light" || s === "dark"
            ? s
            : (window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark");
          var d = document.documentElement;
          d.style.colorScheme = t;
          d.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
